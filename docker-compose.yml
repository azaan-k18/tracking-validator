services:
  mongo:
    image: mongo:6
    container_name: tracking-validator-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: tracking-validator-backend
    restart: unless-stopped
    depends_on:
      - mongo
    environment:
      PORT: 5000
      SERVER_HOST: 0.0.0.0
      MONGO_URI: mongodb://10.10.11.97:27017
      MONGO_DB_NAME: trackingValidator
    ports:
      - "5000:5000"

  frontend:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        BACKEND_INTERNAL_URL: http://backend:5000
    container_name: tracking-validator-frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_INTERNAL_URL: http://backend:5000
      NEXT_PUBLIC_API_BASE_URL: /backend
      VITE_API_BASE_URL: /backend
    ports:
      - "3000:3000"

volumes:
  mongo_data:
